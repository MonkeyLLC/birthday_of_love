<style>
        body {
            background-color: theme('colors.background');
            background-image: radial-gradient(circle at 50% -20%, theme('colors.primary-container') 0%, transparent 60%);
            background-attachment: fixed;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 209, 220, 0.2);
        }
        .gacha-capsule {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, theme('colors.primary-fixed-dim') 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: sparkle-anim 1.5s linear forwards;
        }
        @keyframes sparkle-anim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 0.8; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }
    </style>

<body class="text-on-background font-body-md antialiased pb-24 min-h-screen flex flex-col relative overflow-x-hidden md:hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 border-b border-primary/20 bg-surface/80 backdrop-blur-lg shadow-[0_4px_12px_rgba(255,209,220,0.3)]">
<div class="flex justify-between items-center px-margin-mobile h-16 w-full">
<button class="text-primary dark:text-primary-fixed-dim hover:scale-105 transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="favorite">favorite</span>
</button>
<h1 class="font-headline-sm-mobile text-headline-sm-mobile text-primary dark:text-primary-fixed-dim font-bold tracking-tight">
                Together Since 2022
            </h1>
<button class="text-primary dark:text-primary-fixed-dim hover:scale-105 transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="cake">cake</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 px-margin-mobile flex flex-col items-center justify-center relative z-10">
<!-- Header Text -->
<div class="text-center mb-md">
<h2 class="font-display-lg-mobile text-display-lg-mobile text-on-surface mb-xs">Daily Surprise!</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Tap the machine to reveal a sweet gift.</p>
</div>
<!-- Gachapon Machine Illustration Area -->
<div class="relative w-full max-w-[320px] aspect-[3/4] mb-md flex items-center justify-center">
<!-- Glass dome holding capsules -->
<div class="absolute top-0 w-full h-[60%] glass-card rounded-[3rem] rounded-b-none border-b-0 shadow-[inset_0_-10px_20px_rgba(255,209,220,0.3)] overflow-hidden flex flex-wrap justify-center items-end pb-sm gap-xs">
<!-- Decorative Capsules -->
<div class="w-12 h-12 bg-primary-container rounded-full gacha-capsule border border-white/50 shadow-sm" style="animation-delay: 0.1s;"></div>
<div class="w-12 h-12 bg-secondary-container rounded-full gacha-capsule border border-white/50 shadow-sm" style="animation-delay: 0.5s;"></div>
<div class="w-12 h-12 bg-tertiary-container rounded-full gacha-capsule border border-white/50 shadow-sm" style="animation-delay: 0.3s;"></div>
<div class="w-12 h-12 bg-surface-bright rounded-full gacha-capsule border border-white/50 shadow-sm" style="animation-delay: 0.7s;"></div>
<div class="w-12 h-12 bg-primary-fixed-dim rounded-full gacha-capsule border border-white/50 shadow-sm" style="animation-delay: 0.2s;"></div>
<div class="w-12 h-12 bg-inverse-primary rounded-full gacha-capsule border border-white/50 shadow-sm" style="animation-delay: 0.6s;"></div>
<div class="w-12 h-12 bg-primary-container rounded-full gacha-capsule border border-white/50 shadow-sm" style="animation-delay: 0.4s;"></div>
</div>
<!-- Machine Body -->
<div class="absolute bottom-0 w-[110%] h-[45%] bg-gradient-to-b from-primary-container to-primary-fixed-dim rounded-[2rem] shadow-[0_10px_30px_rgba(255,209,220,0.6)] flex flex-col items-center justify-start pt-sm border border-white/40">
<!-- Turning Knob -->
<div class="w-16 h-16 bg-surface rounded-full shadow-inner flex items-center justify-center mb-sm border-2 border-primary/20">
<div class="w-12 h-4 bg-primary/40 rounded-full rotate-45"></div>
</div>
<!-- Dispenser Slot -->
<div class="w-24 h-12 bg-surface-dim rounded-t-xl border-t-2 border-x-2 border-primary/10 shadow-inner flex justify-center items-end overflow-hidden">
<div class="w-20 h-4 bg-background/50 rounded-t-lg"></div>
</div>
</div>
<!-- Ribbon Decoration -->
<div class="absolute top-[50%] left-1/2 -translate-x-1/2 z-10 w-24 h-8 bg-tertiary-container rounded-full opacity-80 blur-[2px]"></div>
<div class="absolute top-[50%] left-1/2 -translate-x-1/2 z-20 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary text-[40px]" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
<!-- Draw Action -->
<button class="group relative px-xl py-sm bg-gradient-to-r from-primary-container to-primary-fixed-dim rounded-full shadow-[0_10px_20px_rgba(255,209,220,0.4)] hover:shadow-[0_12px_24px_rgba(255,209,220,0.6)] hover:scale-105 active:scale-95 transition-all duration-300 mb-lg overflow-hidden" id="drawButton">
<span class="font-label-md text-label-md text-on-primary-container relative z-10 font-bold uppercase tracking-wider">Draw</span>
<div class="absolute inset-0 bg-white/20 group-hover:translate-x-full -translate-x-full transition-transform duration-500 ease-in-out skew-x-12"></div>
</button>
<!-- Prize Preview Bento -->
<div class="w-full glass-card rounded-xl p-sm">
<h3 class="font-label-md text-label-md text-on-surface-variant text-center mb-sm">Potential Surprises</h3>
<div class="grid grid-cols-2 gap-sm">
<div class="bg-surface/50 rounded-lg p-xs flex flex-col items-center justify-center gap-xs border border-primary/10 hover:bg-primary-container/20 transition-colors">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">spa</span>
<span class="font-label-md text-xs text-on-surface text-center">Massage Voucher</span>
</div>
<div class="bg-surface/50 rounded-lg p-xs flex flex-col items-center justify-center gap-xs border border-primary/10 hover:bg-primary-container/20 transition-colors">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">restaurant</span>
<span class="font-label-md text-xs text-on-surface text-center">Dinner Date</span>
</div>
<div class="bg-surface/50 rounded-lg p-xs flex flex-col items-center justify-center gap-xs border border-primary/10 hover:bg-primary-container/20 transition-colors col-span-2">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">shopping_bag</span>
<span class="font-label-md text-xs text-on-surface text-center">Shopping Spree</span>
</div>
</div>
</div>

</button>
<!-- Active: Gacha -->
<button class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary-fixed text-on-primary-container dark:text-on-primary-fixed rounded-full px-5 py-2 scale-110 transition-all shadow-[0_10px_20px_rgba(255,201,220,0.4)]">
<span class="material-symbols-outlined mb-1" data-icon="redeem" style="font-variation-settings: 'FILL' 1;">redeem</span>
<span class="font-label-md text-label-md">Gacha</span>
</button>
<!-- Inactive: Daily -->
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim px-4 py-2 opacity-70 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined mb-1" data-icon="calendar_month">calendar_month</span>
<span class="font-label-md text-label-md">Daily</span>
</button>
</div>
</nav>
<script>
        document.getElementById('drawButton').addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;

            for (let i = 0; i < 20; i++) {
                createSparkle(x, y);
            }
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            
            // Randomize position slightly around the center
            const offsetX = (Math.random() - 0.5) * 100;
            const offsetY = (Math.random() - 0.5) * 100;
            
            sparkle.style.left = `${x + offsetX}px`;
            sparkle.style.top = `${y + offsetY}px`;
            
            // Randomize animation duration slightly
            sparkle.style.animationDuration = `${0.5 + Math.random() * 1}s`;

            document.body.appendChild(sparkle);

            // Clean up after animation
            setTimeout(() => {
                sparkle.remove();
            }, 1500);
        }
    </script>
</body></html>
